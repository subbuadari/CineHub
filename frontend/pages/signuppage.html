<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#1a0d06",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.25rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .glass-card {
            background: rgba(34, 22, 16, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(236, 91, 19, 0.2)
        }

        .bg-cinema {
            background: linear-gradient(to bottom, rgba(18, 10, 6, 0.4), rgba(18, 10, 6, 0.95)), url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center
        }
    </style>
</head>

<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="relative flex min-h-screen w-full flex-col bg-cinema items-center justify-center p-4"
        data-alt="Blurred cinematic movie theater interior background">
        <div class="w-full max-w-[480px] glass-card rounded-3xl p-8 md:p-10 shadow-2xl">
            <div class="flex flex-col items-center mb-8">
                <div class="bg-primary p-3 rounded-2xl mb-4 shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined text-white text-3xl">movie</span>
                </div>
                <h1 class="text-3xl font-black tracking-tight text-white mb-2">CineHub 2.0</h1>
                <p class="text-slate-400 text-center font-medium">Join the ultimate cinematic experience</p>
            </div>
            <form class="flex flex-col gap-5">
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-slate-300 ml-1">Full Name</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">person</span>
                        <input
                            class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all"
                            placeholder="John Doe" type="text" />
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-slate-300 ml-1">Email Address</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">mail</span>
                        <input
                            class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all"
                            placeholder="name@example.com" type="email" />
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-300 ml-1">Password</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">lock</span>
                            <input
                                class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all"
                                placeholder="••••••••" type="password" />
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-300 ml-1">Confirm</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">shield</span>
                            <input
                                class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all"
                                placeholder="••••••••" type="password" />
                        </div>
                    </div>
                </div>
                <div id="errorMsg"
                    class="hidden bg-red-500/10 border border-red-500/20 text-red-500 text-xs p-3 rounded-lg text-center">
                </div>
                <button id="signUpBtn"
                    class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-2xl shadow-xl shadow-primary/30 transition-all mt-2 active:scale-95"
                    type="button">
                    Create Account
                </button>
            </form>
            <script src="../js/api.js"></script>
            <script>
                document.getElementById('signUpBtn').addEventListener('click', async () => {
                    const name = document.querySelector('input[placeholder="John Doe"]').value;
                    const email = document.querySelector('input[type="email"]').value;
                    const password = document.querySelectorAll('input[type="password"]')[0].value;
                    const confirmPassword = document.querySelectorAll('input[type="password"]')[1].value;
                    const errorMsg = document.getElementById('errorMsg');
                    const signUpBtn = document.getElementById('signUpBtn');

                    if (!name || !email || !password || !confirmPassword) {
                        errorMsg.textContent = "Please fill in all fields";
                        errorMsg.classList.remove('hidden');
                        return;
                    }

                    if (password !== confirmPassword) {
                        errorMsg.textContent = "Passwords do not match";
                        errorMsg.classList.remove('hidden');
                        return;
                    }

                    try {
                        signUpBtn.disabled = true;
                        signUpBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Creating...';

                        await TMDB.register(name, email, password);
                        window.location.href = 'homedashboard.html';
                    } catch (err) {
                        errorMsg.textContent = err.message || "Registration failed. Please try again.";
                        errorMsg.classList.remove('hidden');
                        signUpBtn.disabled = false;
                        signUpBtn.innerHTML = 'Create Account';
                    }
                });
            </script>
            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-white/10"></div>
                </div>
                <div class="relative flex justify-center text-xs uppercase">
                    <span class="bg-background-dark/50 px-3 py-1 rounded-full text-slate-500 backdrop-blur-sm">Or
                        continue with</span>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-4">
                <button
                    class="flex items-center justify-center bg-white/5 border border-white/10 py-3 rounded-2xl hover:bg-white/10 transition-colors">
                    <img alt="" class="w-6 h-6" data-alt="Google colorful G logo icon"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuAZYKQewrmenrAn1OeYREW5zPBAlpbFhM-hAgqlrTxMzwGsDSSGrigRB8XTfeHXpQ_pVu_0beL8YXAn2P9fJiBYCw0tpFZz2jylfJxOPPTCrVUNngT9THJyPeKhmH7MCNDtw6juiW-wYk7CM0ijTM3W04SqIo4OVqYKqcZ0039o039hfBIheRrACwSIoNnN6r_k_l8fP-dNZoYIHw9m4XkZrdrIFS_w6zK3ejOF20SGD1atMPAbvjBppeCy1YN35B7pr9seL5MMB64" />
                </button>
                <button
                    class="flex items-center justify-center bg-white/5 border border-white/10 py-3 rounded-2xl hover:bg-white/10 transition-colors">
                    <span class="material-symbols-outlined text-white text-2xl">ios</span>
                </button>
                <button
                    class="flex items-center justify-center bg-white/5 border border-white/10 py-3 rounded-2xl hover:bg-white/10 transition-colors">
                    <svg class="w-6 h-6 text-[#1877F2]" fill="currentColor" viewbox="0 0 24 24">
                        <path
                            d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="mt-8 text-center">
                <p class="text-slate-400">
                    Already have an account?
                    <a class="text-primary font-bold hover:underline ml-1" href="loginpage.html">Sign in</a>
                </p>
            </div>
        </div>
        <div class="mt-8 flex gap-6 text-slate-500 text-sm">
            <a class="hover:text-white transition-colors" href="#">Terms of Service</a>
            <a class="hover:text-white transition-colors" href="#">Privacy Policy</a>
            <a class="hover:text-white transition-colors" href="#">Cookie Policy</a>
        </div>
    </div>
</body>

</html>
