<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CineHub 2.0 - Edit Profile</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#1a0f0a",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(236, 91, 19, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(236, 91, 19, 0.1);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        <!-- Top Navigation -->
        <header
            class="sticky top-0 z-50 w-full border-b border-primary/20 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-6 lg:px-20 py-3">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-3 text-primary">
                    <span class="material-symbols-outlined text-3xl">movie_filter</span>
                    <h2 class="text-xl font-bold tracking-tight">CineHub 2.0</h2>
                </div>
                <button onclick="window.location.href='profilepage.html'"
                    class="text-sm font-bold text-slate-500 hover:text-primary transition-colors flex items-center gap-1">
                    <span class="material-symbols-outlined text-sm">arrow_back</span> Back to Profile
                </button>
            </div>
        </header>

        <main class="max-w-3xl mx-auto w-full px-6 py-12">
            <div class="mb-10 text-center md:text-left">
                <h1 class="text-4xl font-black mb-2">Edit Profile</h1>
                <p class="text-slate-500">Customize how you're seen in the CineHub community.</p>
            </div>

            <form id="edit-profile-form" class="space-y-8">
                <!-- Avatar Section -->
                <div class="glass-panel p-8 rounded-2xl flex flex-col md:flex-row items-center gap-8">
                    <div class="relative group">
                        <div class="size-32 rounded-full border-4 border-primary p-1 overflow-hidden">
                            <img id="avatar-preview" class="w-full h-full object-cover rounded-full"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuCrOYMEvnHb9CnlaMLiup8mdMq3d9-oR9uukt0PzYJso8-XBDNpS1RLDhGENR3WtokRslwteHHIJTccaa88w7dBL7-r5Bk4PlJCHyyvroWSSGiWX4zZKf1qsKuYviMOgmTnL1meq21aRla7YUFqfBuqtUyMkxXSsLaRSZUXeVcAd_20jHqfsozmPuUBnnbz0IZQSZLnZkYWocKugUnTT87gK_SiNRYMhsHpopawMy_1syBVRxqwJkQ8vrfs_Ht77Tp73OjM5NL467Q" />
                        </div>
                        <label for="avatar-url"
                            class="absolute inset-0 flex items-center justify-center bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity rounded-full cursor-pointer">
                            <span class="material-symbols-outlined text-white">camera_alt</span>
                        </label>
                    </div>
                    <div class="flex-1 space-y-4 w-full">
                        <label class="block">
                            <span class="text-sm font-bold uppercase tracking-widest text-primary/70 mb-2 block">Profile
                                Picture</span>
                            <div class="flex gap-4">
                                <button type="button" onclick="document.getElementById('avatar-file').click()"
                                    class="flex-1 bg-primary/10 border border-primary/20 rounded-xl px-4 py-3 text-primary font-bold hover:bg-primary/20 transition-all flex items-center justify-center gap-2">
                                    <span class="material-symbols-outlined">image</span>
                                    Choose from Gallery
                                </button>
                                <input id="avatar-file" type="file" accept="image/*" class="hidden" />
                            </div>
                        </label>
                        <p class="text-xs text-slate-500">Supported formats: JPG, PNG, GIF. Max size: 2MB.</p>
                    </div>
                </div>

                <!-- Basic Info -->
                <div class="glass-panel p-8 rounded-2xl space-y-6">
                    <label class="block">
                        <span class="text-sm font-bold uppercase tracking-widest text-primary/70 mb-2 block">Display
                            Name</span>
                        <input id="display-name" type="text"
                            class="w-full bg-primary/5 border-primary/20 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"
                            placeholder="Alex Rivera" />
                    </label>

                    <label class="block">
                        <span class="text-sm font-bold uppercase tracking-widest text-primary/70 mb-2 block">Bio</span>
                        <textarea id="profile-bio" rows="4"
                            class="w-full bg-primary/5 border-primary/20 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all resize-none"
                            placeholder="Tell the community about your cinematic taste..."></textarea>
                    </label>
                </div>

                <!-- Actions -->
                <div class="flex flex-col md:flex-row gap-4">
                    <button type="submit"
                        class="flex-1 bg-primary text-white py-4 rounded-xl font-black text-lg shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all">
                        Save Changes
                    </button>
                    <button type="button" onclick="window.location.href='profilepage.html'"
                        class="px-8 py-4 bg-primary/5 border border-primary/20 rounded-xl font-bold hover:bg-primary/10 transition-all">
                        Cancel
                    </button>
                </div>
            </form>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('edit-profile-form');
            const nameInput = document.getElementById('display-name');
            const bioInput = document.getElementById('profile-bio');
            const avatarFile = document.getElementById('avatar-file');
            const avatarPreview = document.getElementById('avatar-preview');
            let currentAvatarBase64 = '';

            // Load existing profile from localStorage
            const userProfile = JSON.parse(localStorage.getItem('userProfile') || '{}');

            if (userProfile.name) nameInput.value = userProfile.name;
            if (userProfile.bio) bioInput.value = userProfile.bio;
            if (userProfile.avatar) {
                avatarPreview.src = userProfile.avatar;
                currentAvatarBase64 = userProfile.avatar;
            }

            // Handle file selection
            avatarFile.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 2 * 1024 * 1024) {
                        alert('Image too large. Please select a file under 2MB.');
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = (event) => {
                        avatarPreview.src = event.target.result;
                        currentAvatarBase64 = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });

            form.onsubmit = (e) => {
                e.preventDefault();

                const updatedProfile = {
                    name: nameInput.value.trim() || 'Alex Rivera',
                    bio: bioInput.value.trim() || 'Cinephile, critic, and visual storyteller.',
                    avatar: currentAvatarBase64 || avatarPreview.src
                };

                localStorage.setItem('userProfile', JSON.stringify(updatedProfile));

                // Visual feedback
                const btn = e.target.querySelector('button[type="submit"]');
                const originalText = btn.textContent;
                btn.textContent = 'Changes Saved!';
                btn.classList.add('bg-green-600');
                btn.classList.remove('bg-primary');

                setTimeout(() => {
                    window.location.href = 'profilepage.html';
                }, 800);
            };
        });
    </script>
</body>

</html>
